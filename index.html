<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPN Mini App Constructor</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root,[data-theme="dark"]{
  --md-primary:#A8C7FA;--md-on-primary:#062E6F;--md-primary-container:#1B4A97;--md-on-primary-container:#D3E3FD;
  --md-surface:#0E1117;--md-surface-dim:#0E1117;--md-surface-container:#161B22;--md-surface-container-low:#12161D;
  --md-surface-container-high:#1C2230;--md-surface-container-highest:#232A3A;--md-surface-bright:#2D3546;
  --md-on-surface:#E3E3E3;--md-on-surface-var:#C4C7CF;--md-outline:#8B949E;--md-outline-var:#30363D;
  --md-inverse-surface:#E3E3E3;--md-error:#FFB4AB;--md-tertiary:#D0BCFF;--md-tertiary-container:#4F378B;
  --md-success:#81C995;--md-warning:#FDD663;
  --md-elevation-1:0 1px 3px 1px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.4);
  --md-elevation-2:0 2px 6px 2px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.4);
  --md-elevation-3:0 4px 8px 3px rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.4);
  --md-state-hover:rgba(168,199,250,.08);--md-state-press:rgba(168,199,250,.12);
  --md-scrim:rgba(0,0,0,.6);
  --md-radius-xs:8px;--md-radius-sm:12px;--md-radius-md:16px;--md-radius-lg:20px;--md-radius-xl:28px;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
[data-theme="light"]{
  --md-primary:#1A5FB4;--md-on-primary:#FFFFFF;--md-primary-container:#D3E3FD;--md-on-primary-container:#062E6F;
  --md-surface:#FAFBFF;--md-surface-dim:#D9DBE0;--md-surface-container:#EEEEF2;--md-surface-container-low:#F3F3F7;
  --md-surface-container-high:#E8E8EC;--md-surface-container-highest:#E2E2E6;--md-surface-bright:#FAFBFF;
  --md-on-surface:#1B1C20;--md-on-surface-var:#44474E;--md-outline:#74777F;--md-outline-var:#C4C6CF;
  --md-inverse-surface:#2F3036;--md-error:#BA1A1A;--md-tertiary:#6750A4;--md-tertiary-container:#EADDFF;
  --md-success:#1E8E3E;--md-warning:#F9AB00;
  --md-elevation-1:0 1px 3px 1px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.12);
  --md-elevation-2:0 2px 6px 2px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.12);
  --md-elevation-3:0 4px 8px 3px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.12);
  --md-state-hover:rgba(26,95,180,.06);--md-state-press:rgba(26,95,180,.1);
  --md-scrim:rgba(0,0,0,.4);
}
html,body,#root{height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--md-surface);color:var(--md-on-surface);-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--md-outline-var);border-radius:3px;}
button{font-family:inherit;cursor:pointer;}input,textarea,select{font-family:inherit;}
.app-layout{display:grid;grid-template-columns:340px 1fr 360px;grid-template-rows:1fr;height:100vh;overflow:hidden;}
.sidebar{background:var(--md-surface-container);border-right:1px solid var(--md-outline-var);display:flex;flex-direction:column;overflow:hidden;z-index:30;transition:transform .35s cubic-bezier(.4,0,.2,1),background .3s;}
.sidebar-header{padding:20px 20px 16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--md-outline-var);}
.sidebar-logo{width:40px;height:40px;border-radius:var(--md-radius-sm);background:var(--md-primary-container);display:flex;align-items:center;justify-content:center;font-size:20px;}
.sidebar-title{font-size:16px;font-weight:800;letter-spacing:-.3px;}
.sidebar-sub{font-size:11px;color:var(--md-on-surface-var);font-weight:500;margin-top:2px;}
.tab-bar{display:flex;padding:0 8px;border-bottom:1px solid var(--md-outline-var);}
.tab-item{flex:1;text-align:center;padding:12px 6px;font-size:12px;font-weight:700;color:var(--md-on-surface-var);cursor:pointer;position:relative;transition:color .2s;letter-spacing:.3px;user-select:none;}
.tab-item:hover{color:var(--md-on-surface);}.tab-item.active{color:var(--md-primary);}
.tab-item.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:var(--md-primary);border-radius:3px 3px 0 0;}
.tab-body{flex:1;overflow-y:auto;padding:16px 18px 24px;}
.section-label{font-size:11px;font-weight:800;color:var(--md-on-surface-var);text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--md-outline-var);}
.section-label:first-child{margin-top:0;}
.field{margin-bottom:14px;}.field-label{display:block;font-size:11px;font-weight:600;color:var(--md-on-surface-var);margin-bottom:6px;}
.field-input{width:100%;background:var(--md-surface);border:1.5px solid var(--md-outline-var);border-radius:var(--md-radius-sm);color:var(--md-on-surface);font-family:var(--font);font-size:13px;padding:10px 14px;outline:none;transition:border .2s,box-shadow .2s,background .3s;min-width:0;}
.field-input:focus{border-color:var(--md-primary);box-shadow:0 0 0 3px rgba(168,199,250,.15);}
.field-input::placeholder{color:var(--md-outline);}
.color-field{display:flex;gap:8px;align-items:center;}
.color-swatch{width:44px;height:38px;border-radius:var(--md-radius-sm);border:1.5px solid var(--md-outline-var);cursor:pointer;padding:2px;flex-shrink:0;}
.color-hex{flex:1;font-family:var(--mono);font-size:12px;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;}
.toggle-text{font-size:13px;color:var(--md-on-surface-var);font-weight:500;}
.toggle-switch{width:44px;height:24px;background:var(--md-outline-var);border-radius:12px;cursor:pointer;position:relative;transition:background .25s;flex-shrink:0;border:none;padding:0;}
.toggle-switch.on{background:var(--md-primary);}
.toggle-switch::after{content:'';position:absolute;width:18px;height:18px;background:var(--md-surface-bright);border-radius:50%;top:3px;left:3px;transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:var(--md-elevation-1);}
.toggle-switch.on::after{transform:translateX(20px);background:#fff;}
.range-group{display:flex;align-items:center;gap:12px;}
.range-slider{flex:1;accent-color:var(--md-primary);height:4px;cursor:pointer;}
.range-value{font-size:12px;font-family:var(--mono);color:var(--md-on-surface-var);min-width:40px;text-align:right;font-weight:500;background:var(--md-surface-container-high);padding:3px 8px;border-radius:6px;}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.chip{padding:8px 16px;border-radius:var(--md-radius-xs);border:1.5px solid var(--md-outline-var);font-size:12px;font-weight:600;color:var(--md-on-surface-var);cursor:pointer;transition:all .2s;background:transparent;font-family:var(--font);user-select:none;}
.chip:hover{background:var(--md-state-hover);border-color:var(--md-outline);}
.chip.active{border-color:var(--md-primary);color:var(--md-primary);background:var(--md-state-press);}
.plan-card{background:var(--md-surface);border:1.5px solid var(--md-outline-var);border-radius:var(--md-radius-md);padding:14px;margin-bottom:12px;position:relative;transition:border .2s,background .3s;}
.plan-card:hover{border-color:var(--md-outline);}
.plan-number{font-size:10px;font-weight:700;background:var(--md-surface-container-highest);color:var(--md-on-surface-var);padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:10px;}
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}.plan-grid .full{grid-column:1/-1;}.plan-grid input{padding:8px 10px;font-size:12px;}
.plan-del{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--md-outline);cursor:pointer;font-size:16px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.plan-del:hover{color:var(--md-error);background:rgba(255,180,171,.1);}
.period-section{margin-top:10px;}.period-label{font-size:10px;font-weight:700;color:var(--md-outline);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.period-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:4px;}.period-grid input{padding:6px 8px;font-size:11px;min-width:0;}
.btn-dashed{width:100%;padding:10px;background:transparent;border:1.5px dashed var(--md-outline-var);border-radius:var(--md-radius-sm);color:var(--md-on-surface-var);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font);}
.btn-dashed:hover{border-color:var(--md-primary);color:var(--md-primary);background:var(--md-state-hover);}
.btn-dashed-sm{padding:5px 10px;font-size:11px;width:auto;border-radius:var(--md-radius-xs);margin-top:4px;}
.fx-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--md-radius-sm);border:1.5px solid var(--md-outline-var);background:var(--md-surface);cursor:pointer;transition:all .2s;margin-bottom:8px;user-select:none;}
.fx-item:hover{background:var(--md-state-hover);border-color:var(--md-outline);}
.fx-item.active{border-color:var(--md-primary);background:var(--md-state-press);}
.fx-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0;}
.fx-name{font-size:13px;font-weight:600;color:var(--md-on-surface);}.fx-desc{font-size:11px;color:var(--md-outline);margin-top:2px;}
.fx-check{margin-left:auto;width:20px;height:20px;border-radius:6px;border:2px solid var(--md-outline-var);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all .2s;color:transparent;flex-shrink:0;}
.fx-item.active .fx-check{background:var(--md-primary);border-color:var(--md-primary);color:var(--md-on-primary);}
.preview-area{display:flex;flex-direction:column;align-items:center;padding:20px;gap:16px;overflow:auto;background:var(--md-surface-dim);transition:background .3s;}
.preview-toolbar{display:flex;align-items:center;gap:10px;width:100%;max-width:480px;flex-wrap:wrap;}
.preview-toolbar-label{font-size:12px;font-weight:600;color:var(--md-outline);}
.page-pills{display:flex;gap:4px;flex:1;}
.page-pill{padding:7px 14px;font-size:11px;font-weight:600;border-radius:var(--md-radius-xl);border:1.5px solid var(--md-outline-var);background:var(--md-surface-container);color:var(--md-on-surface-var);cursor:pointer;transition:all .2s;font-family:var(--font);white-space:nowrap;}
.page-pill:hover{border-color:var(--md-outline);}.page-pill.active{background:var(--md-primary);color:var(--md-on-primary);border-color:var(--md-primary);}
.btn-filled{padding:9px 20px;background:var(--md-primary);color:var(--md-on-primary);border:none;border-radius:var(--md-radius-xl);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap;box-shadow:var(--md-elevation-1);}
.btn-filled:hover{box-shadow:var(--md-elevation-2);filter:brightness(1.05);}
.phone-shell{position:relative;width:375px;flex-shrink:0;}
.phone-bezel{width:375px;height:680px;border-radius:36px;background:var(--md-surface-container);border:2px solid var(--md-outline-var);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--md-elevation-3);transition:border-color .3s,background .3s;}
.phone-bezel iframe{width:100%;flex:1;border:none;background:#0a0d14;}
.phone-island{position:absolute;top:6px;left:50%;transform:translateX(-50%);width:80px;height:18px;background:var(--md-surface-container);border-radius:0 0 10px 10px;z-index:5;border:1px solid var(--md-outline-var);border-top:none;}
.status-line{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--md-outline);font-weight:500;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--md-success);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.ai-panel{background:var(--md-surface-container);border-left:1px solid var(--md-outline-var);display:flex;flex-direction:column;overflow:hidden;z-index:30;transition:transform .35s cubic-bezier(.4,0,.2,1),background .3s;}
.ai-header{padding:18px 20px;border-bottom:1px solid var(--md-outline-var);display:flex;align-items:center;gap:12px;}
.ai-badge{width:36px;height:36px;border-radius:var(--md-radius-sm);background:linear-gradient(135deg,var(--md-primary),var(--md-tertiary));display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;}
.ai-title{font-size:15px;font-weight:700;}.ai-subtitle{font-size:11px;color:var(--md-on-surface-var);margin-top:1px;}
.ai-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.msg-bubble{padding:12px 16px;border-radius:var(--md-radius-md);font-size:13px;line-height:1.65;max-width:88%;word-break:break-word;}
.msg-bubble.from-ai{background:var(--md-surface-container-high);color:var(--md-on-surface);align-self:flex-start;border-bottom-left-radius:var(--md-radius-xs);}
.msg-bubble.from-user{background:var(--md-primary-container);color:var(--md-on-primary-container);align-self:flex-end;border-bottom-right-radius:var(--md-radius-xs);}
.msg-bubble em{color:var(--md-primary);font-style:normal;font-weight:600;}
.typing-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--md-outline);animation:blink 1.2s infinite;margin:0 2px;}
.typing-dot:nth-child(2){animation-delay:.2s;}.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
.quick-actions{padding:4px 16px 10px;display:flex;flex-wrap:wrap;gap:6px;}
.qa-chip{font-size:11px;padding:6px 12px;border-radius:var(--md-radius-xl);background:var(--md-surface-container-high);border:1px solid var(--md-outline-var);color:var(--md-on-surface-var);cursor:pointer;transition:all .2s;font-family:var(--font);font-weight:500;}
.qa-chip:hover{background:var(--md-state-hover);border-color:var(--md-primary);color:var(--md-primary);}
.ai-input-bar{padding:14px 16px;border-top:1px solid var(--md-outline-var);display:flex;gap:10px;align-items:flex-end;}
.ai-textarea{flex:1;background:var(--md-surface);border:1.5px solid var(--md-outline-var);border-radius:var(--md-radius-md);color:var(--md-on-surface);font-family:var(--font);font-size:13px;padding:11px 14px;outline:none;resize:none;min-height:42px;max-height:120px;transition:border .2s,box-shadow .2s;}
.ai-textarea:focus{border-color:var(--md-primary);box-shadow:0 0 0 3px rgba(168,199,250,.12);}
.ai-send{width:40px;height:40px;border-radius:var(--md-radius-sm);background:var(--md-primary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:all .2s;color:var(--md-on-primary);box-shadow:var(--md-elevation-1);}
.ai-send:hover{box-shadow:var(--md-elevation-2);}.ai-send:disabled{background:var(--md-outline-var);color:var(--md-outline);cursor:not-allowed;box-shadow:none;}
.mobile-topbar{display:none;position:fixed;top:0;left:0;right:0;z-index:100;background:var(--md-surface-container);border-bottom:1px solid var(--md-outline-var);padding:0 12px;height:56px;align-items:center;gap:8px;transition:background .3s;}
.mobile-btn,.theme-btn{background:none;border:1px solid var(--md-outline-var);border-radius:var(--md-radius-sm);width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:var(--md-on-surface);font-size:18px;cursor:pointer;transition:all .2s;flex-shrink:0;}
.mobile-btn:hover,.theme-btn:hover{background:var(--md-state-hover);}
.mobile-title{flex:1;font-size:15px;font-weight:700;letter-spacing:-.2px;}
.mobile-ai-btn{background:linear-gradient(135deg,var(--md-primary),var(--md-tertiary));border:none;border-radius:var(--md-radius-sm);width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800;cursor:pointer;}
.drawer-overlay{display:none;position:fixed;inset:0;background:var(--md-scrim);z-index:25;backdrop-filter:blur(3px);opacity:0;transition:opacity .3s;}
.drawer-overlay.show{display:block;opacity:1;}
@media(max-width:1280px){.app-layout{grid-template-columns:300px 1fr 320px;}}
@media(max-width:1024px){
  .app-layout{grid-template-columns:1fr;}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:340px;transform:translateX(-100%);box-shadow:var(--md-elevation-3);z-index:40;}
  .sidebar.open{transform:translateX(0);}
  .ai-panel{position:fixed;right:0;top:0;bottom:0;width:360px;transform:translateX(100%);box-shadow:var(--md-elevation-3);z-index:40;}
  .ai-panel.open{transform:translateX(0);}
  .mobile-topbar{display:flex;}.preview-area{padding-top:72px;}
}
@media(max-width:600px){
  .sidebar{width:88%;}.ai-panel{width:100%;}
  .preview-area{padding:64px 10px 10px;}.preview-toolbar{gap:6px;}
  .page-pills{overflow-x:auto;flex-wrap:nowrap;gap:4px;-webkit-overflow-scrolling:touch;}.page-pill{flex-shrink:0;}
  .phone-shell{width:100%;max-width:375px;}.phone-bezel{width:100%;height:calc(100vh - 200px);border-radius:24px;}
  .btn-filled span.dl-text{display:none;}
}
</style>
</head>
<body data-theme="dark">
<div id="root"></div>
